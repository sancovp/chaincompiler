[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "steward"
version = "0.1.0"
description = "The Custodian genus (lowest rung) — a loop-runner gated by a warrant, off the graph"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
grammar = ["glyphsteer"]      # the rulecatcher/glyph warrant (the fidelity upgrade)

[tool.setuptools.packages.find]
where = ["src"]
