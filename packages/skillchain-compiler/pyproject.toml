[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "skillchain"
version = "0.1.0"
description = "Compose Claude Code skills into a validated, packaged chain"
requires-python = ">=3.11"

[project.scripts]
skillchain = "skillchain:main"

[tool.setuptools]
py-modules = ["skillchain"]
