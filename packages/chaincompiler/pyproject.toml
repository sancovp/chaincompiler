[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "chaincompiler"
version = "0.1.0"
description = "The printing press for agent cognition chains: learn → gate → compile → prime"
requires-python = ">=3.11"
# honeyc and rulecatcher are installed editable from their own repos.
dependencies = ["honeyc", "rulecatcher"]

[project.scripts]
chaincompiler = "chaincompiler.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
