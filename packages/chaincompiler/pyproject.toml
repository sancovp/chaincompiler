[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "chaincompiler"
version = "0.1.0"
description = "The printing press for agent cognition chains: learn → gate → compile → prime"
requires-python = ">=3.11"
# honeyc + the *CC are vendored in this monorepo (packages/); install.sh wires them.
# agent-prompt-engineering is the published prompt-engine BASE chaincompiler imports DOWN onto.
dependencies = ["honeyc", "rulecatcher", "agent-skilltree", "agent-prompt-engineering"]

# NOTE: the `chaincompiler` CLI command moved to the `chainaios` package (its AIOS subcommands are
# *CC-coupled, which would make this BASE import the *CC). The command NAME is unchanged — see
# packages/chainaios/pyproject.toml [project.scripts].

[tool.setuptools.packages.find]
where = ["src"]
