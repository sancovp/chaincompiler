name: deploy-site

# Validates every push (changelog gate + regenerate + staleness check), and
# publishes the roadmap site to GitHub Pages — but only when the repo is PUBLIC
# (Pages isn't available on a private repo without a paid plan, so the deploy job
# is skipped on private and the run stays green).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2          # need HEAD~1 for the changelog diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Changelog gate (require a new README entry)
        run: python3 scripts/check_changelog.py --require-new

      - name: Regenerate site + roadmap SVG from sources
        run: python3 scripts/update_site.py

      - name: Fail if generated site is stale (not committed)
        run: |
          if ! git diff --quiet -- site/data.json assets/roadmap.svg; then
            echo "::error::site/data.json or assets/roadmap.svg is stale — run scripts/update_site.py and commit."
            git --no-pager diff --stat -- site/data.json assets/roadmap.svg
            exit 1
          fi

  deploy:
    needs: validate
    # Pages requires a public repo (or paid private Pages). Skip on private.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
