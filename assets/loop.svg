    <marker id="mg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/></marker>
  </defs>

  <text x="24" y="34" font-size="12" font-weight="700" letter-spacing=".08em" fill="#9a9a96">THE LOOP — every *CC runs this</text>

  <rect x="24"  y="56" width="128" height="64" rx="8" class="box"/>
  <text x="40" y="84" class="t">examples</text><text x="40" y="102" class="s">a notation, by example</text>
  <rect x="184" y="56" width="128" height="64" rx="8" class="box"/>
  <text x="200" y="84" class="t">catch</text><text x="200" y="102" class="s">learn the grammar</text>
  <rect x="344" y="56" width="128" height="64" rx="8" class="box"/>
  <text x="360" y="84" class="t">lint / gate</text><text x="360" y="102" class="s">keep it well-formed</text>
  <rect x="504" y="56" width="120" height="64" rx="8" class="box"/>
