  <rect x="656" y="56" width="92" height="64" rx="8" class="box"/>
  <text x="672" y="80" class="t">package</text><text x="672" y="98" class="s">&lt;name&gt;/</text><text x="672" y="111" class="s">SKILL.md</text>

  <path class="a" d="M152 88 H184"/>
  <path class="a" d="M312 88 H344"/>
  <path class="a" d="M472 88 H504"/>
  <path class="a" d="M624 88 H656"/>

  <path class="lp" d="M702 120 V160 H226 V120"/>
