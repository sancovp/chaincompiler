<svg viewBox="0 0 760 230" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="0" y="0" width="760" height="230" rx="14" fill="#ffffff"/>
  <style>
    .box{fill:#ffffff;stroke:#d2d2cc;stroke-width:1.5}
    .t{font-size:13px;font-weight:700;fill:#15151a}
    .s{font-size:10.5px;fill:#5e5e66}
    .a{stroke:#b9b9b4;stroke-width:1.8;fill:none;marker-end:url(#m)}
